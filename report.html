<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>보안 사고 대응 보고서</title>
  <style>
    :root {
      --bg: #f5efe5;
      --bg2: #e7dcc8;
      --panel: rgba(255, 252, 247, 0.88);
      --panel2: #fffdf9;
      --text: #172027;
      --muted: #5d6972;
      --line: rgba(23, 32, 39, 0.1);
      --accent: #0d6273;
      --accent-soft: rgba(13, 98, 115, 0.12);
      --shadow: 0 20px 70px rgba(53, 40, 18, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(229, 107, 45, 0.1), transparent 28%),
        radial-gradient(circle at top right, rgba(13, 98, 115, 0.16), transparent 34%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
    }

    .page {
      width: min(1100px, calc(100% - 32px));
      margin: 18px auto 48px;
    }

    .hero, .panel {
      background: var(--panel);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.24);
      border-radius: 26px;
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -70px;
      top: -70px;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(13,98,115,.18), transparent 68%);
    }

    .eyebrow {
      display: inline-flex;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    h1, h2, h3, p { margin: 0; }

    h1 {
      margin-top: 14px;
      font-size: clamp(34px, 5vw, 58px);
      line-height: .95;
      letter-spacing: -.05em;
      max-width: 900px;
    }

    .hero p {
      margin-top: 16px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 820px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
      position: relative;
      z-index: 1;
    }

    .btn {
      font: inherit;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel2);
      color: var(--text);
      padding: 10px 14px;
      cursor: pointer;
    }

    .btn.primary {
      background: var(--accent);
      color: white;
      border-color: transparent;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 18px;
      margin-top: 18px;
    }

    .panel {
      padding: 22px;
    }

    .span-12 { grid-column: span 12; }

    .report-cover, .report-block {
      border-radius: 20px;
      border: 1px solid var(--line);
      background: var(--panel2);
    }

    .report-cover {
      padding: 22px;
      background: linear-gradient(180deg, var(--accent-soft), transparent 65%), var(--panel2);
    }

    .report-title {
      margin-top: 14px;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -.04em;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 16px;
      margin-top: 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: end;
      margin-bottom: 18px;
    }

    .section-head p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .report-stack {
      display: grid;
      gap: 12px;
    }

    .report-block {
      padding: 18px;
    }

    .report-block h3 {
      font-size: 19px;
      letter-spacing: -.02em;
      margin-bottom: 10px;
    }

    .report-block p, .toc {
      color: var(--muted);
      line-height: 1.65;
      font-size: 14px;
    }

    .toc {
      display: grid;
      gap: 8px;
    }

    @media (max-width: 980px) {
      .meta-grid {
        grid-template-columns: 1fr;
      }
    }

    @media print {
      body { background: white; }
      .toolbar { display: none !important; }
      .hero, .panel { box-shadow: none; border: 1px solid #ddd; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <span class="eyebrow">Board Report</span>
      <h1>보안 사고 대응 보고서 및 제로트러스트 전환 계획</h1>
      <p>이 페이지는 대시보드와 분리된 정적 보고서입니다. 이사회와 경영진 제출용 본문만 담고 있으며, PDF 다운로드를 지원합니다.</p>
      <div class="toolbar">
        <button class="btn primary" id="downloadPdfBtn">PDF 다운로드</button>
        <button class="btn" id="openDashboardBtn">대시보드로 돌아가기</button>
      </div>
    </section>

    <section class="grid">
      <div class="panel span-12">
        <div class="section-head">
          <div>
            <h2>문서 본문</h2>
            <p>CSV 입력 없이 고정된 제출용 문서입니다. 버튼을 누르면 브라우저의 PDF 저장 창이 열립니다.</p>
          </div>
        </div>
        <div class="report-stack" id="reportRoot"></div>
      </div>
    </section>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    const report = {
      cover: {
        title: "보안 사고 대응 보고서 및 제로트러스트 전환 계획",
        meta: [
          ["작성일", "2026년 4월 3일"],
          ["작성 부서", "정보보호실 보안대응팀"],
          ["보고 대상", "CISO, CEO, 경영진, 이사회"],
          ["문서 등급", "내부용"],
          ["문서 버전", "v1.1"]
        ]
      },
      toc: [
        "1. Executive Summary",
        "2. 사고 개요 및 비즈니스 영향",
        "3. 기술 분석 및 침투 경로",
        "4. 근본 원인 분석",
        "5. 즉각 대응 조치",
        "6. 포렌식·법적·대외 대응",
        "7. 재발 방지 대책",
        "8. 제로트러스트 전환 로드맵",
        "9. 예산 및 인력 계획",
        "10. 경영진 승인 요청",
        "11. 결론"
      ],
      sections: [
        {
          title: "1. Executive Summary",
          body: "2026년 4월 3일 새벽, 외부 공격자는 웹 취약점을 통해 관리자 권한 탈취 가능성을 만들었고, 이어 분산 로그인 공격으로 일반 계정 8개를 탈취한 정황이 확인되었습니다. 같은 시점에 내부 권한 계정 emp_0142를 이용한 인사 데이터 대량 추출이 발생해 개인정보 및 급여정보 노출 가능성이 존재합니다. 이번 사고는 단순 해킹 시도가 아니라 인증, 권한, 탐지 체계 전반의 구조적 취약점을 드러낸 사건입니다. 즉시 계정 보호와 법적 대응이 필요하며, 6개월 내 제로트러스트 전환 착수가 필요합니다."
        },
        {
          title: "2. 사고 개요 및 비즈니스 영향",
          body: "확인된 공격은 SQL Injection, Credential Stuffing, Directory Traversal, 내부자 또는 탈취 계정 기반 민감정보 접근입니다. 비즈니스 영향은 개인정보 및 급여정보 노출 가능성, 개인정보보호법상 신고·통지 검토 필요성, 임직원 및 이해관계자 신뢰 저하, 규제 대응 및 조사 비용 증가입니다."
        },
        {
          title: "3. 기술 분석 및 침투 경로",
          body: "공격 벡터는 SQL Injection(입력값 조작 공격), Credential Stuffing(유출 계정정보 재사용 공격), Directory Traversal(시스템 내부 파일 접근 시도), 내부자 또는 탈취 계정 기반 민감정보 접근입니다. 침투 흐름은 SQL Injection → 관리자 계정 탈취 가능성 → 일반 계정 8개 탈취 → 내부 시스템 추가 탐색 → emp_0142 계정 기반 인사 데이터 대량 추출 순으로 해석됩니다. 영향 범위는 관리자 계정 1개 가능성, 일반 계정 8개, 급여 및 개인정보 약 16.7MB, 주요 시간대는 02:15~04:30입니다."
        },
        {
          title: "4. 근본 원인 분석",
          body: "기술적 근본 원인은 parameterized query 미적용, 로그인 API rate limiting 부재, MFA 미적용, 과도한 권한 부여, UEBA 부재, API 인증 토큰 만료 시간이 24시간으로 과도하게 긴 점입니다. 조직적 원인은 보안 코드 리뷰 부재, 접근 권한 정기 감사 미실시, 보안 교육 부족, 탐지 운영 성숙도 미흡입니다."
        },
        {
          title: "5. 즉각 대응 조치",
          body: "즉시 실행 조치는 관리자 포함 탈취 의심 계정 전체 비밀번호 강제 리셋, 활성 세션 및 인증 토큰 전체 무효화, 공격자 IP 차단, emp_0142 계정 임시 정지 및 포렌식 조사 착수입니다."
        },
        {
          title: "6. 포렌식·법적·대외 대응",
          body: "실제 유출 데이터 범위 확정, 개인정보보호위원회 신고 필요성 판단, 영향받은 직원 통지 계획 수립, 법률팀과의 상시 연계, 서버 로그·DB 감사 로그·VPN 로그·다운로드 기록 포렌식 보존이 필요합니다."
        },
        {
          title: "7. 재발 방지 대책",
          body: "단기 1주 내 WAF 룰 강화, Rate Limiting 적용, MFA 강제를 완료해야 합니다. 중기 1개월 내 코드 보안 감사, 권한 체계 재설계, SIEM 고도화를 수행하고, 장기 6개월 내 제로트러스트 전환, 보안 교육 프로그램, 정기 모의 침투 테스트를 정례화해야 합니다."
        },
        {
          title: "8. 제로트러스트 전환 로드맵",
          body: "제로트러스트의 핵심은 Never Trust, Always Verify입니다. 기존 경계형 보안은 내부망을 상대적으로 신뢰했지만, 제로트러스트는 내부 이동까지 포함해 사용자 신원, 단말 상태, 권한, 맥락을 계속 검증합니다. Phase 1(1~2개월)은 ID 기반 접근통제와 MFA·토큰 수명 단축, Phase 2(3~4개월)는 마이크로세그멘테이션과 ZTNA 적용, Phase 3(5~6개월)는 UEBA/XDR 연계와 지속적 검증 자동화입니다. 권장 기술 스택은 IAM + IdP(Okta, Azure AD), ZTNA(Zscaler, Cloudflare Access), SASE/SD-WAN, UEBA/XDR, PAM, DLP입니다."
        },
        {
          title: "9. 예산 및 인력 계획",
          body: "예산 범위는 IdP/SSO/MFA 연 3천만~8천만 원, SIEM 및 로그 저장 연 5천만~1.5억 원, ZTNA 연 4천만~1억 원, EDR/XDR 연 4천만~1억 원, PAM 연 3천만~8천만 원, 컨설팅·구축 1회 5천만~2억 원, 교육 및 모의훈련 연 1천만~3천만 원 수준입니다. 필요 인력은 보안 아키텍트 1명, IAM/IdP 엔지니어 1명, 보안 운영 분석가 1~2명, 인프라·네트워크 엔지니어 1명, 애플리케이션 보안 담당 1명입니다."
        },
        {
          title: "10. 경영진 승인 요청",
          body: "긴급 대응 예산, 계정 리셋과 세션 무효화 등 즉시 조치, 6개월 제로트러스트 전환 계획, 보안 인력 및 외부 컨설팅 예산에 대한 승인이 필요합니다."
        },
        {
          title: "11. 결론",
          body: "이번 사고는 외부 웹 공격, 분산 로그인 공격, 내부 민감정보 대량 접근이 연결된 복합 사고입니다. 문제는 공격 자체보다 왜 이를 막지 못했는가에 있으며, 인증 강화·최소 권한·이상행위 탐지·짧은 토큰 수명·코드 보안 통제가 함께 보완되어야 합니다."
        }
      ]
    };

    const reportRoot = document.getElementById("reportRoot");
    const downloadPdfBtn = document.getElementById("downloadPdfBtn");

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderReport() {
      reportRoot.innerHTML =
        '<div class="report-cover">' +
          '<div class="eyebrow">Board Submission Draft</div>' +
          '<div class="report-title">' + escapeHtml(report.cover.title) + '</div>' +
          '<div class="meta-grid">' +
            report.cover.meta.map(([k, v]) => '<div><strong>' + escapeHtml(k) + '</strong><div style="margin-top:4px;color:var(--muted);">' + escapeHtml(v) + '</div></div>').join("") +
          '</div>' +
        '</div>' +
        '<div class="report-block"><h3>목차</h3><div class="toc">' + report.toc.map((item) => '<div>' + escapeHtml(item) + '</div>').join("") + '</div></div>' +
        report.sections.map((section) => '<div class="report-block"><h3>' + escapeHtml(section.title) + '</h3><p>' + escapeHtml(section.body) + '</p></div>').join("");
    }

    async function exportPdf() {
      const originalText = downloadPdfBtn.textContent;
      downloadPdfBtn.textContent = "PDF 생성 중...";
      downloadPdfBtn.disabled = true;
      try {
        const target = document.querySelector(".page");
        const canvas = await html2canvas(target, {
          scale: 2,
          useCORS: true,
          backgroundColor: "#f5efe5"
        });
        const imgData = canvas.toDataURL("image/png");
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF("p", "mm", "a4");
        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();
        const imgWidth = pageWidth;
        const imgHeight = canvas.height * imgWidth / canvas.width;
        let heightLeft = imgHeight;
        let position = 0;

        pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
        heightLeft -= pageHeight;

        while (heightLeft > 0) {
          position = heightLeft - imgHeight;
          pdf.addPage();
          pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
          heightLeft -= pageHeight;
        }

        pdf.save("security-executive-report.pdf");
      } finally {
        downloadPdfBtn.textContent = originalText;
        downloadPdfBtn.disabled = false;
      }
    }

    downloadPdfBtn.addEventListener("click", exportPdf);
    document.getElementById("openDashboardBtn").addEventListener("click", () => {
      window.location.href = "./index.html";
    });

    renderReport();
  </script>
</body>
</html>
